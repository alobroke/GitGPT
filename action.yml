name: "GitGPT"

description: "Ask natural-language questions about any GitHub repository using Retrieval-Augmented Generation (RAG), semantic search, and LLMs."

author: "alobroke"

branding:
  icon: "search"
  color: "purple"

inputs:
  question:
    description: "Question to ask about the repository"
    required: true

  github-token:
    description: "GitHub token used for PR/Issue comments"
    required: false
    default: ""

  llm-provider:
    description: "LLM provider: ollama, openai, anthropic"
    required: false
    default: "openai"

  llm-model:
    description: "Model name for the selected provider"
    required: false
    default: "gpt-4o-mini"

  api-key:
    description: "API key for OpenAI or Anthropic"
    required: false
    default: ""

  embedding-model:
    description: "Embedding model used for repository indexing"
    required: false
    default: "BAAI/bge-small-en-v1.5"

  top-k:
    description: "Number of chunks retrieved before reranking"
    required: false
    default: "8"

  paths:
    description: "Comma-separated file patterns to index"
    required: false
    default: "**/*.py,**/*.js,**/*.ts,**/*.tsx,**/*.jsx,**/*.go,**/*.java,**/*.md"

  post-comment:
    description: "Post answer back to GitHub PR/Issue"
    required: false
    default: "false"

  cache-index:
    description: "Cache repository index between runs"
    required: false
    default: "true"

outputs:
  answer:
    description: "Generated answer"

  sources:
    description: "JSON array of source file paths and line ranges"

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.question }}